[AccessTransformers]

; Friend: lets FBFPHooks take the address of the protected Factory_CollectInput_Implementation to hook it.
Friend=(Class="AFGBuildableTrainPlatformCargo", FriendClass="FBFPHooks")

; Accessor: generates public GetmX()/SetmX(value) so our free functions/lambdas can read/write the
; otherwise private/protected docking state we drive for the two-pass dock.
Accessor=(Class="AFGBuildableTrainPlatformCargo", Property="mInventory")
Accessor=(Class="AFGBuildableTrainPlatformCargo", Property="mFreightCargoType")
Accessor=(Class="AFGBuildableTrainPlatformCargo", Property="mIsInLoadMode")
; Configured load/unload animation durations (seconds). Used as the denominator when WE compute the
; per-direction wagon transfer rate ourselves. The game's own mSmoothedLoad/UnloadRate are unusable
; here: it samples the inventory via mCargoInventoryHandler->GetActiveInventory(), which our two-pass
; mInventory swaps confuse, so those values stay ~0 during our transfers.
Accessor=(Class="AFGBuildableTrainPlatformCargo", Property="mTimeToCompleteLoad")
Accessor=(Class="AFGBuildableTrainPlatformCargo", Property="mTimeToCompleteUnload")
; Fluid pipe connections (in / out), so the UI can flush just the input or just the output network.
Accessor=(Class="AFGBuildableTrainPlatformCargo", Property="mPipeInputConnections")
Accessor=(Class="AFGBuildableTrainPlatformCargo", Property="mPipeOutputConnections")
Accessor=(Class="AFGBuildableTrainPlatform", Property="mPlatformDockingStatus")
; The "full unload" flag. Our two-pass leaves it set from the unload pass; we force it back to 0 during the
; injected load pass so the dock anim BP doesn't see BOTH mIsFullLoad and mIsFullUnload set (which breaks the
; client animation). Setter generated as SetmIsFullUnload().
Accessor=(Class="AFGBuildableTrainPlatformCargo", Property="mIsFullUnload")
Accessor=(Class="AFGBuildable", Property="mInteractWidgetSoftClass")
; Per-slot arbitrary sizes (fluid platforms set a large one here). Read directly so we can copy the fluid
; capacity onto the load buffer WITHOUT calling GetSlotSize() on empty/no-arbitrary slots, which logs
; "Can't find a slot size!" once per slot and floods the server log on solid platforms at startup.
Accessor=(Class="UFGInventoryComponent", Property="mArbitrarySlotSizes")
